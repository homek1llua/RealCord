name: RealCord
options:
  bundleIdPrefix: com.realcord
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 10.0.0
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 7.0.0

settings:
  base:
    SWIFT_VERSION: "5.7"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: RealCord/Info.plist

targets:
  RealCord:
    type: application
    platform: iOS
    sources:
      - RealCord
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.realcord
        INFOPLIST_FILE: RealCord/Info.plist
    dependencies:
      - package: firebase-ios-sdk
        products: [FirebaseAuth, FirebaseFirestore, FirebaseStorage, FirebaseMessaging]
      - package: Kingfisher
