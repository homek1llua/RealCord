name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BUNDLE_ID: com.realcord
  APP_NAME: RealCord

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate

      - name: Resolve SPM dependencies
        run: |
          cd ios
          xcodebuild -resolvePackageDependencies \
            -project RealCord.xcodeproj \
            -scheme RealCord

      - name: Build
        run: |
          cd ios
          xcodebuild -project RealCord.xcodeproj \
            -scheme RealCord \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/"${{ env.APP_NAME }}.app" Payload/
          zip -r "${{ env.APP_NAME }}.ipa" Payload
          rm -rf Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}.ipa
          path: ${{ env.APP_NAME }}.ipa

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}.app
          path: ios/build/Build/Products/Release-iphoneos/${{ env.APP_NAME }}.app
